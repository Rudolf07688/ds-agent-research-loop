# Alembic configuration for the memory-compaction ablation Postgres schema.
#
# The database URL is NOT stored here — env.py derives it from the centralized Settings
# (DATABASE_URL), so the same migrations run locally and in the container without edits.
# Schema changes MUST ship as migrations under alembic/versions/ (constitution Principle IV).

[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url is intentionally left blank; env.py fills it from Settings / a passed URL.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
